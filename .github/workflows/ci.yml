name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff

      - name: Lint with Ruff
        run: ruff check agenttrace/ --select E,F,W --ignore E501

      - name: Verify import works
        run: python -c "from agenttrace.models import AgentTrace, TraceStep; print('✅ Import OK')"

      - name: Verify server module loads
        run: python -c "from agenttrace.server import app; print('✅ Server module OK')"

      - name: Verify judge module loads
        run: python -c "from agenttrace.judge import JudgeEngine; print('✅ Judge module OK')"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ui
        run: npm ci

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Verify build output exists
        run: test -f agenttrace/static/index.html && echo "✅ Frontend build OK"
